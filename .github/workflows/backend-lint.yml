name: Backend Code Quality & SQL Blocker

on:
  pull_request:
    branches: [ "main", "develop", "staging" ]

jobs:
  lint-and-check-sql:
    name: Lint & Block Raw SQL
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" 

      - name: 📦 Install Linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8 

      - name: 🔍 Run Standard Python Linter (Flake8)
        # This only checks for critical errors like syntax issues or undefined variables.
        # It will NOT fail for formatting/spacing issues.
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🛑 The Custom SQL Blocker
        run: |
          echo "Scanning for raw SQL usage in the src/ directory..."
          
          # We use grep to search for the 4 most common ways developers write raw SQL in Django
          # 1. objects.raw(...)
          # 2. connection.cursor(...)
          # 3. .execute(...)
          # 4. RawSQL(...)
          
          if grep -rnE "objects\.raw\(|connection\.cursor\(|\.execute\(|RawSQL\(" src/ ; then
            echo "--------------------------------------------------------"
            echo "🚨 RAW SQL DETECTED! PR MERGE BLOCKED! 🚨"
            echo "For security and maintainability, please rewrite the above queries using the Django ORM."
            echo "--------------------------------------------------------"
            exit 1
          else
            echo "✅ No raw SQL found. You are good to go!"
          fi